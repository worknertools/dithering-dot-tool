  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Coding Systems - Type Play (Ultra Sharp Halftone)</title>
    <style>
        :root {
            --ui-bg: #ffffff;
            --ui-border: #eeeeee;
            --ui-accent: #000000;
            --ui-text: #000000;
            --ui-text-dim: #666666;
            --ui-btn-bg: #000000;
            --slider-track: #000000;
            --font-mono: "Menlo", "Consolas", "Courier New", "PingFang SC", "Microsoft YaHei", monospace;
        }

        body {
            margin: 0; padding: 0;
            background-color: #e5e5e5;
            font-family: var(--font-mono);
            color: var(--ui-text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #ui { display: flex; height: 100vh; }

        #ui-left {
            width: 320px;
            background: var(--ui-bg);
            border-right: 1px solid var(--ui-border);
            height: 100vh;
            overflow-y: auto;
            pointer-events: all;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-sizing: border-box;
        }

        .noselect { user-select: none; }

        .ui-component {
            padding: 16px 24px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }

        .b-bot { border-bottom: 1px solid var(--ui-border); }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--ui-text-dim);
            margin-bottom: 2px;
            font-weight: bold;
        }

        label span { color: var(--ui-accent); font-family: var(--font-mono); }

        select {
            width: 100%;
            padding: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            border: 1px solid #000;
            outline: none;
            background: #fff;
            cursor: pointer;
            text-transform: uppercase;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 1px;
            background: var(--slider-track);
            outline: none;
            margin: 8px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px; height: 12px;
            background: var(--ui-accent);
            cursor: pointer;
            border-radius: 0;
        }

        .smallBtn {
            background: #000; border: none; color: #fff;
            padding: 10px; font-size: 10px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; display: inline-flex;
            align-items: center; justify-content: center;
            box-sizing: border-box;
        }
        .smallBtn:hover { background: #333; }

        .colorSelector { display: flex; align-items: center; gap: 12px; }
        .color-item { flex: 1; display: flex; flex-direction: column; gap: 4px; }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%; height: 32px;
            border: 1px solid #000;
            padding: 0; background: none; cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; }

        .export-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

        #artboard {
            flex: 1; display: flex; align-items: center;
            justify-content: center; position: relative;
            overflow: hidden; cursor: default; 
        }

        #canvasWrapper { 
            line-height: 0; background: #fff;
            width: 600px; height: 800px;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
        }
        
        #mainCanvas { width: 600px; height: 800px; }

        .footer-credit { 
            font-size: 11px; color: #000; padding: 24px; 
            margin-top: auto; letter-spacing: 1px; 
            font-weight: 900; text-transform: uppercase;
        }

        #uploadPlaceholder {
            width: 100%; height: 50px; border: 1px solid #000; 
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 18px; cursor: pointer;
            overflow: hidden; position: relative; box-sizing: border-box;
        }
        #uploadPlaceholder img { width: 100%; height: 100%; object-fit: cover; }
        .reset-btn { background: none; border: none; color: #999; padding: 0; font-size: 9px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .reset-btn:hover { color: #000; }
    </style>
</head>

<body>
    <main id="ui">
        <aside id="ui-left" class="noselect">
            <div class="ui-component b-bot">
                <label>Upload File 上传图片</label>
                <div id="uploadPlaceholder" onclick="document.getElementById('userfile').click()">+</div>
                <input type="file" id="userfile" accept="image/*" style="display: none;" />
            </div>

            <div class="ui-component b-bot">
                <label>Render Mode 风格模式</label>
                <select id="renderMode">
                    <option value="dither">Dither 扩散抖动</option>
                    <option value="ordered">Ordered 拜耳抖动</option>
                    <option value="halftone">Halftone 半调网点(超清矢量)</option>
                </select>
            </div>

            <div class="ui-component b-bot">
                <label>Custom Colors 颜色设置</label>
                <div class="colorSelector">
                    <div class="color-item">
                        <label>Light</label>
                        <input type="color" id="lightcolor" value="#ffffff">
                    </div>
                    <div class="color-item">
                        <label>Dark</label>
                        <input type="color" id="darkcolor" value="#000000">
                    </div>
                </div>
            </div>

            <div class="ui-component b-bot">
                <label>Dot Size 网点大小 <span id="val-dotSize">5</span></label>
                <input type='range' min=1 max=40 id='dotSize' value=5 step=1>
            </div>

            <div class="ui-component b-bot">
                <label>Dot Spacing 间距效果 <span id="val-dotSpacing">0</span></label>
                <input type='range' min=0 max=40 id='dotSpacing' value=0 step=1>
            </div>

            <div class="ui-component b-bot">
                <label>Brightness 亮度 <span id="val-brightness">0.00</span></label>
                <input type='range' min=-1 max=1 id='brightness' value=0 step="any">
            </div>

            <div class="ui-component b-bot">
                <label>Contrast 对比度 <span id="val-contrast">0.00</span></label>
                <input type='range' min=-1 max=1 id='contrast' value=0 step="any">
            </div>

            <div class="ui-component" style="margin-top: 10px;">
                <label>Export 导出 <button class="reset-btn" onclick="resetTool()">重置 RESET</button></label>
                <div class="export-grid">
                    <button class="smallBtn" onclick="downloadExport('jpg')">JPG</button>
                    <button class="smallBtn" onclick="downloadExport('png')">PNG</button>
                    <button class="smallBtn" onclick="downloadExport('svg')">SVG</button>
                </div>
            </div>
            <div class="footer-credit">2026 ©design by Type play</div>
        </aside>

        <section id="artboard">
            <div id="canvasWrapper"><canvas id="mainCanvas"></canvas></div>
        </section>
    </main>
    <canvas id="refCanvas" style="display:none;"></canvas>

    <script>
        "use strict";

        let canv, ctx, img;
        let refCanv, refCtx;
        let scratchCanv = document.createElement("canvas");
        let scratchCtx = scratchCanv.getContext("2d");
        
        let goodImage = false;
        const previewBaseWidth = 600;
        const previewBaseHeight = 800; 
        let brightness, contrast, lightColor, darkColor, dotSize, renderMode, dotSpacing;
        let brFactor, conFactor;

        let viewScale = 1, viewPosX = 0, viewPosY = 0;
        let isDragging = false, lastMouseX, lastMouseY;

        const coeffR = 0.299, coeffG = 0.587, coeffB = 0.114;
        let errBuff, dimx, dimy;
        const bayer8x8 = [
            [ 0, 32,  8, 40,  2, 34, 10, 42], [48, 16, 56, 24, 50, 18, 58, 26],
            [12, 44,  4, 36, 14, 46,  6, 38], [60, 28, 52, 20, 62, 30, 54, 22],
            [ 3, 35, 11, 43,  1, 33,  9, 41], [51, 19, 59, 27, 49, 17, 57, 25],
            [15, 47,  7, 39, 13, 45,  5, 37], [63, 31, 55, 23, 61, 29, 53, 21]
        ];

        function init() {
            canv = document.getElementById("mainCanvas");
            ctx = canv.getContext("2d");
            const dpr = window.devicePixelRatio || 1;
            canv.width = previewBaseWidth * dpr;
            canv.height = previewBaseHeight * dpr;
            canv.style.width = previewBaseWidth + 'px';
            canv.style.height = previewBaseHeight + 'px';
            ctx.scale(dpr, dpr);
            refCanv = document.getElementById("refCanvas");
            refCtx = refCanv.getContext("2d", { willReadFrequently: true });
            img = new Image();
            img.onload = () => { goodImage = true; processImage(); };
            initInteractions();
        }

        function initInteractions() {
            const artboard = document.getElementById('artboard');
            artboard.addEventListener('wheel', (e) => {
                if (!goodImage) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const nextScale = viewScale * delta;
                if (nextScale > 0.4 && nextScale < 40) { viewScale = nextScale; drawToDisplay(); }
            }, { passive: false });

            artboard.addEventListener('mousedown', (e) => {
                if (!goodImage) return;
                isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                viewPosX += e.clientX - lastMouseX; viewPosY += e.clientY - lastMouseY;
                lastMouseX = e.clientX; lastMouseY = e.clientY;
                drawToDisplay();
            });
            window.addEventListener('mouseup', () => isDragging = false);
        }

        function readUI() {
            let lVal = document.getElementById("lightcolor").value;
            lightColor = [parseInt(lVal.substring(1,3),16), parseInt(lVal.substring(3,5),16), parseInt(lVal.substring(5),16)];
            let dVal = document.getElementById("darkcolor").value;
            darkColor = [parseInt(dVal.substring(1,3),16), parseInt(dVal.substring(3,5),16), parseInt(dVal.substring(5),16)];
            brightness = parseFloat(document.getElementById("brightness").value);
            document.getElementById("val-brightness").innerText = brightness.toFixed(2);
            contrast = parseFloat(document.getElementById("contrast").value);
            document.getElementById("val-contrast").innerText = contrast.toFixed(2);
            dotSize = parseInt(document.getElementById("dotSize").value, 10);
            document.getElementById("val-dotSize").innerText = dotSize;
            dotSpacing = parseInt(document.getElementById("dotSpacing").value, 10);
            document.getElementById("val-dotSpacing").innerText = dotSpacing;
            brFactor = brightness * (1 + Math.abs(brightness)) * 100;
            conFactor = (1 + 0.95 * contrast) / (1 - 0.95 * contrast);
            renderMode = document.getElementById("renderMode").value;
        }

        function getFitRect(imgW, imgH, targetW, targetH) {
            let imgRatio = imgW / imgH, targetRatio = targetW / targetH, dw, dh, dx, dy;
            if (imgRatio > targetRatio) { dw = targetW; dh = targetW / imgRatio; dx = 0; dy = (targetH - dh) / 2; } 
            else { dh = targetH; dw = targetH * imgRatio; dx = (targetW - dw) / 2; dy = 0; }
            return { dx, dy, dw, dh };
        }

        function processImage() {
            if (!goodImage || !img.src) return;
            readUI();
            const baseResX = 1200, baseResY = 1600; 
            refCanv.width = baseResX; refCanv.height = baseResY;
            refCtx.fillStyle = "#ffffff"; refCtx.fillRect(0,0,baseResX,baseResY);
            const rect = getFitRect(img.width, img.height, baseResX, baseResY);
            refCtx.drawImage(img, rect.dx, rect.dy, rect.dw, rect.dh);
            if (renderMode !== 'halftone') {
                const step = dotSize + dotSpacing;
                dimx = Math.round(previewBaseWidth / step); dimy = Math.round(previewBaseHeight / step);
                scratchCanv.width = dimx; scratchCanv.height = dimy;
                scratchCtx.drawImage(refCanv, 0, 0, dimx, dimy);
                const srcData = scratchCtx.getImageData(0, 0, dimx, dimy);
                refCanv.width = dimx; refCanv.height = dimy;
                const outData = refCtx.createImageData(dimx, dimy);
                if (renderMode === 'dither') {
                    errBuff = [[], []]; errBuff[1] = new Array(dimx + 1).fill(0);
                    for (let y = 0; y < dimy; y++) { renderDitherLine(y, refCtx, srcData, dimx); }
                } else {
                    for (let y = 0; y < dimy; y++) {
                        for (let x = 0; x < dimx; x++) {
                            let i = (y * dimx + x) * 4;
                            let gray = srcData.data[i] * coeffR + srcData.data[i+1] * coeffG + srcData.data[i+2] * coeffB;
                            gray += brFactor; gray = conFactor * (gray - 128) + 128;
                            let threshold = (bayer8x8[y % 8][x % 8] / 64) * 255;
                            let val = (gray > threshold) ? 255 : 0;
                            outData.data[i] = val; outData.data[i+1] = val; outData.data[i+2] = val; outData.data[i+3] = 255;
                        }
                    }
                    refCtx.putImageData(outData, 0, 0);
                }
            }
            drawToDisplay();
        }

        function drawToDisplay() {
            const bgHex = document.getElementById("lightcolor").value;
            const dotHex = document.getElementById("darkcolor").value;
            ctx.fillStyle = bgHex; ctx.fillRect(0, 0, previewBaseWidth, previewBaseHeight);
            ctx.save();
            ctx.translate(previewBaseWidth / 2 + viewPosX, previewBaseHeight / 2 + viewPosY);
            ctx.scale(viewScale, viewScale);
            ctx.translate(-previewBaseWidth / 2, -previewBaseHeight / 2);
            const step = dotSize + dotSpacing;
            if (renderMode === 'halftone') {
                ctx.fillStyle = dotHex;
                scratchCanv.width = 600; scratchCanv.height = 800;
                scratchCtx.drawImage(refCanv, 0, 0, 1200, 1600, 0, 0, 600, 800);
                const srcData = scratchCtx.getImageData(0, 0, 600, 800);
                for (let y = 0; y < 800; y += step) {
                    for (let x = 0; x < 600; x += step) {
                        let idx = (Math.floor(y) * 600 + Math.floor(x)) * 4;
                        if (idx >= srcData.data.length) continue;
                        let gray = srcData.data[idx] * coeffR + srcData.data[idx+1] * coeffG + srcData.data[idx+2] * coeffB;
                        gray += brFactor; gray = conFactor * (gray - 128) + 128;
                        let norm = 1 - (Math.min(255, Math.max(0, gray)) / 255);
                        if (norm > 0.01) {
                            let radius = (norm * dotSize * 0.95) / 2;
                            ctx.beginPath(); ctx.arc(x + step/2, y + step/2, radius, 0, Math.PI * 2); ctx.fill();
                        }
                    }
                }
            } else {
                const pData = refCtx.getImageData(0, 0, refCanv.width, refCanv.height);
                const bleed = 0.5;
                for (let y = 0; y < refCanv.height; y++) {
                    for (let x = 0; x < refCanv.width; x++) {
                        let idx = (y * refCanv.width + x) * 4;
                        ctx.fillStyle = (pData.data[idx] > 128) ? bgHex : dotHex;
                        ctx.fillRect(x * step, y * step, dotSize + bleed, dotSize + bleed);
                    }
                }
            }
            ctx.restore();
        }

        function renderDitherLine(ky, targetCtx, targetSrcData, targetDimX) {
            let err; errBuff[0] = errBuff[1]; errBuff[1] = new Array(targetDimX + 1).fill(0);
            let ptSrc = ky * targetDimX * 4;
            const imageDataBW = targetCtx.createImageData(targetDimX, 1);
            const bufBW = imageDataBW.data;
            for (let kx = 0; kx < targetDimX; ++kx) {
                let color = targetSrcData.data[ptSrc] * coeffR + targetSrcData.data[ptSrc + 1] * coeffG + targetSrcData.data[ptSrc + 2] * coeffB;
                color += brFactor; color = conFactor * (color - 128) + 128; color /= 255;
                if (color > 1) color = 1; if (color < 0) color = 0;
                color += errBuff[0][kx];
                let val = (color > 0.5) ? 255 : 0;
                err = (color > 0.5) ? color - 1 : color;
                let p = kx * 4;
                bufBW[p] = val; bufBW[p+1] = val; bufBW[p+2] = val; bufBW[p+3] = 255;
                errBuff[0][kx + 1] += (7 * err) / 16; errBuff[1][kx - 1] += (3 * err) / 16;
                errBuff[1][kx + 0] += (5 * err) / 16; errBuff[1][kx + 1] += (1 * err) / 16;
                ptSrc += 4;
            }
            targetCtx.putImageData(imageDataBW, 0, ky);
        }

        async function downloadExport(type) {
            if (!goodImage) return;
            const exportW = 3508, exportH = 4677, expScale = exportW / previewBaseWidth;
            const lHex = document.getElementById("lightcolor").value, dHex = document.getElementById("darkcolor").value;
            const step = dotSize + dotSpacing;
            const s = (viewScale * expScale).toFixed(4);
            const tx = (exportW/2 + viewPosX*expScale - (previewBaseWidth/2*viewScale*expScale)).toFixed(2);
            const ty = (exportH/2 + viewPosY*expScale - (previewBaseHeight/2*viewScale*expScale)).toFixed(2);
            if (type === 'svg') {
                let svgShapes = "";
                if (renderMode === 'halftone') {
                    scratchCanv.width = 600; scratchCanv.height = 800;
                    scratchCtx.drawImage(refCanv, 0,0,1200,1600,0,0,600,800);
                    const srcData = scratchCtx.getImageData(0,0,600,800);
                    for (let y = 0; y < 800; y += step) {
                        for (let x = 0; x < 600; x += step) {
                            let idx = (Math.floor(y) * 600 + Math.floor(x)) * 4;
                            let gray = srcData.data[idx] * coeffR + srcData.data[idx+1] * coeffG + srcData.data[idx+2] * coeffB;
                            gray += brFactor; gray = conFactor * (gray - 128) + 128;
                            let norm = 1 - (Math.min(255, Math.max(0, gray)) / 255);
                            if (norm > 0.01) {
                                let radius = (norm * dotSize * 0.95) / 2;
                                svgShapes += `<circle cx="${(x+step/2).toFixed(2)}" cy="${(y+step/2).toFixed(2)}" r="${radius.toFixed(3)}" fill="${dHex}"/>`;
                            }
                        }
                    }
                } else {
                    const pData = refCtx.getImageData(0, 0, refCanv.width, refCanv.height);
                    const bleed = 0.5;
                    for (let y = 0; y < refCanv.height; y++) {
                        for (let x = 0; x < refCanv.width; x++) {
                            let idx = (y * refCanv.width + x) * 4;
                            if (pData.data[idx] <= 128) svgShapes += `<rect x="${x * step}" y="${y * step}" width="${dotSize + bleed}" height="${dotSize + bleed}" fill="${dHex}"/>`;
                        }
                    }
                }
                const svgFull = `<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="${exportW}" height="${exportH}"><rect width="${exportW}" height="${exportH}" fill="${lHex}"/><g transform="translate(${tx},${ty}) scale(${s})">${svgShapes}</g></svg>`;
                const blob = new Blob([svgFull], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(blob), link = document.createElement('a');
                link.href = url; link.download = "export.svg"; link.click(); URL.revokeObjectURL(url); return;
            }
            const finalCanv = document.createElement("canvas"); finalCanv.width = exportW; finalCanv.height = exportH;
            const finalCtx = finalCanv.getContext("2d");
            if (type !== 'png') { finalCtx.fillStyle = lHex; finalCtx.fillRect(0,0,exportW,exportH); }
            finalCtx.save(); finalCtx.translate(exportW/2 + viewPosX*expScale, exportH/2 + viewPosY*expScale);
            finalCtx.scale(viewScale*expScale, viewScale*expScale); finalCtx.translate(-previewBaseWidth/2, -previewBaseHeight/2);
            if (renderMode === 'halftone') {
                finalCtx.fillStyle = dHex; scratchCanv.width = 600; scratchCanv.height = 800;
                scratchCtx.drawImage(refCanv, 0,0,1200,1600,0,0,600,800);
                const srcData = scratchCtx.getImageData(0,0,600,800);
                for (let y = 0; y < 800; y += step) {
                    for (let x = 0; x < 600; x += step) {
                        let idx = (Math.floor(y) * 600 + Math.floor(x)) * 4;
                        let gray = srcData.data[idx] * coeffR + srcData.data[idx+1] * coeffG + srcData.data[idx+2] * coeffB;
                        gray += brFactor; gray = conFactor * (gray - 128) + 128;
                        let norm = 1 - (Math.min(255, Math.max(0, gray)) / 255);
                        if (norm > 0.01) { let radius = (norm * dotSize * 0.95) / 2; finalCtx.beginPath(); finalCtx.arc(x + step/2, y + step/2, radius, 0, Math.PI * 2); finalCtx.fill(); }
                    }
                }
            } else {
                const pData = refCtx.getImageData(0, 0, refCanv.width, refCanv.height);
                const bleed = 0.5;
                for (let y = 0; y < refCanv.height; y++) {
                    for (let x = 0; x < refCanv.width; x++) {
                        let idx = (y * refCanv.width + x) * 4;
                        let isLight = pData.data[idx] > 128; if (type === 'png' && isLight) continue;
                        finalCtx.fillStyle = isLight ? lHex : dHex; finalCtx.fillRect(x * step, y * step, dotSize + bleed, dotSize + bleed);
                    }
                }
            }
            finalCtx.restore(); const link = document.createElement('a'); link.href = finalCanv.toDataURL(type==='png'?'image/png':'image/jpeg', 0.95);
            link.download = `export.${type}`; link.click();
        }

        function resetTool() {
            goodImage = false; img.src = "";
            document.getElementById("userfile").value = "";
            document.getElementById("uploadPlaceholder").innerHTML = "+";
            
            // 彻底重置 UI 参数
            document.getElementById("renderMode").value = "dither";
            document.getElementById("lightcolor").value = "#ffffff";
            document.getElementById("darkcolor").value = "#000000";
            document.getElementById("dotSize").value = 5;
            document.getElementById("dotSpacing").value = 0;
            document.getElementById("brightness").value = 0;
            document.getElementById("contrast").value = 0;
            
            // 重置数值显示
            document.getElementById("val-dotSize").innerText = "5";
            document.getElementById("val-dotSpacing").innerText = "0";
            document.getElementById("val-brightness").innerText = "0.00";
            document.getElementById("val-contrast").innerText = "0.00";

            // 重置坐标与缩放
            viewScale = 1; viewPosX = 0; viewPosY = 0;
            
            // 清空画布
            ctx.clearRect(0, 0, previewBaseWidth, previewBaseHeight);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, previewBaseWidth, previewBaseHeight);
        }

        window.onload = init;
        document.getElementById("userfile").onchange = function(e) {
            if (e.target.files && e.target.files[0]) {
                let r = new FileReader();
                r.onload = ev => { img.src = ev.target.result; document.getElementById("uploadPlaceholder").innerHTML = `<img src="${ev.target.result}">`; };
                r.readAsDataURL(e.target.files[0]);
            }
        };

        let updatePending = false;
        function scheduleUpdate(full = true) {
            if (updatePending) return;
            updatePending = true;
            requestAnimationFrame(() => {
                if (goodImage) { full ? processImage() : (readUI(), drawToDisplay()); }
                updatePending = false;
            });
        }

        ["brightness", "contrast", "dotSize", "renderMode", "dotSpacing"].forEach(id => {
            document.getElementById(id).oninput = () => scheduleUpdate(true);
        });
        ["lightcolor", "darkcolor"].forEach(id => {
            document.getElementById(id).oninput = () => scheduleUpdate(false);
        });
    </script>
</body>
</html>
